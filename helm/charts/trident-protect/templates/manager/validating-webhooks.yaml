  - apiGroups:
    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - appmirrorrelationships
    - backupinplacerestores
    - snapshotinplacerestores
    - backuprestores
    - snapshotrestores
  sideEffects: None
- admissionReviewVersions:
  - v1
