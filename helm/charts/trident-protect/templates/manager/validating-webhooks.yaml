{{- $tls := fromYaml (include "tridentprotect.gen-certs" .) }}
{{- $caBundle := include "tridentprotect.gen-ca-bundle" (list $tls.caCert .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.tlsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tridentprotect.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $tls.caCert }}
  tls.crt: {{ $tls.clientCert }}
  tls.key: {{ $tls.clientKey }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ .Values.namePrefix }}-validating-webhook-configurations
  labels:
    {{- include "tridentprotect.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tp-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /application-validator
    caBundle: {{ $caBundle }}
  failurePolicy: Fail
  name: vapplication.protect.trident.netapp.io
  rules:
  - apiGroups:
    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - applications
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tp-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /appvault-access-validator
    caBundle: {{ $caBundle }}
  failurePolicy: Fail
  name: vappvault-access.protect.trident.netapp.io
  rules:
  - apiGroups:
    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - appmirrorrelationships
    - backupinplacerestores
    - backuprestores
    - exechookruns
    - kopiavolumebackups
    - kopiavolumerestores
    - resourcebackups
    - resourcedeletes
    - resourcerestores
    - resticvolumebackups
    - resticvolumerestores
    - shutdownsnapshots
    - snapshotinplacerestores
    - snapshotrestores
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tp-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /appvault-creation-validator
    caBundle: {{ $caBundle }}
  failurePolicy: Fail
  name: vappvault-creation.protect.trident.netapp.io
  rules:
  - apiGroups:
    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - appvaults
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tp-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /autosupportbundle-creation-validator
    caBundle: {{ $caBundle }}
  failurePolicy: Fail
  name: vautosupportbundle-creation.protect.trident.netapp.io
