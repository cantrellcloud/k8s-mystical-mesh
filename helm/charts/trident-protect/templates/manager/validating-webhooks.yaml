    service:
      name: tp-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /non-tp-namespace-creation-validator
    caBundle: {{ $caBundle }}
  failurePolicy: Fail
  name: vcr-namespace-creation.protect.trident.netapp.io
  rules:
  - apiGroups:
    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - applications
    - appmirrorrelationships
    - appmirrorupdates
    - backupinplacerestores
    - backuprestores
    - exechooks
    - exechooksruns
    - kopiavolumebackups
    - kopiavolumerestores
    - resourcebackups
    - resourcedeletes
    - resourcerestores
    - resourceviewers
    - resticvolumebackups
    - resticvolumerestores
    - shutdownsnapshots
    - snapshotinplacerestores
    - snapshotrestores
  sideEffects: None
