    - protect.trident.netapp.io
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - autosupportbundleschedules
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: tp-webhook-service
