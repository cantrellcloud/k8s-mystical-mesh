{{- if .Values.scc.create }}
  {{- if .Capabilities.APIVersions.Has "security.openshift.io/v1/SecurityContextConstraints" }}
kind: SecurityContextConstraints
metadata:
  name: {{ .Values.scc.name }}
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities:
  - DAC_READ_SEARCH
  - DAC_OVERRIDE
  - CHOWN
  - NET_BIND_SERVICE
seccompProfiles:
  - 'runtime/default'
  - 'localhost/kubevirt/kubevirt.json'
apiVersion: security.openshift.io/v1
fsGroup:
  type: RunAsAny
groups: []
priority: {{ .Values.scc.priority }}
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:{{ .Release.Namespace }}:{{ .Values.namePrefix }}-controller-manager
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  {{- end }}
{{- end }}
