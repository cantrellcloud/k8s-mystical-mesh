---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: schedules.protect.trident.netapp.io
spec:
  group: protect.trident.netapp.io
  names:
    kind: Schedule
    listKind: ScheduleList
    plural: schedules
    singular: schedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.granularity
      name: Granularity
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.error
      name: Error
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Schedule is the Schema for the schedules API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScheduleSpec defines the desired state of Schedule
            properties:
              appVaultRef:
                description: |-
                  AppVaultRef is the reference to the AppVault to use as the target of the backup/snapshot.
                  if not specified, the AppVaultTargetsRef will be used.
                  if specified, AppVaultTargetsRef must not be specified.
                type: string
              appVaultTargetsRef:
                description: |-
                  AppVaultTargetsRef is the reference to the AppVaultTargets CR that contains references to the
                  corresponding AppVault targets. (only available with NetApp Backup and Recovery service)
                  if not specified, the AppVaultRef will be used.
                  if specified, AppVaultRef must not be specified.
                type: string
              applicationRef:
                description: ApplicationRef is the reference to the Application.
                type: string
              backupReclaimPolicy:
                default: Retain
                description: |-
                  BackupReclaimPolicy defines what happens to a backup when the Backup CR gets deleted while in retention period (after retention period backup always gets deleted)
                  Valid options are Retain (default), Delete.
                enum:
                - Retain
                - Delete
                type: string
              backupRetention:
                description: Indicates how many backups to retain. Zero indicates
                  that no backups should be created.
                maxLength: 63
                minLength: 0
                pattern: ^(0|([1-9][0-9]*))$
                type: string
              dataMover:
                default: Kopia
                description: |-
                  DataMover specifies which data mover to use for backups.
                  Valid options are Kopia (default), Restic, CBS. (CBS is only available with NetApp Backup and Recovery service)
                enum:
                - Kopia
                - Restic
                - CBS
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              dayOfMonth:
                description: Numeric value indicating the day of the month (1-31)
                  , or -1 to indicate the last day of the month to execute the schedule.
                  This field is only present if granularity is set to "Monthly".
                type: string
              dayOfWeek:
                description: Numeric value indicating the day of the week (0-7) to
                  execute the schedule. This field is only present if granularity
                  is set to "Weekly".
                type: string
              enabled:
                default: true
                description: Indicates if a schedule is active.
                type: boolean
              granularity:
                description: Indicates the granularity of the schedule.
                enum:
                - Hourly
                - Daily
                - Weekly
                - Monthly
                - Custom
                type: string
              hour:
                description: Numeric value indicating the hour of the day (0 - 23)
                  to execute the schedule. This field is present if granularity is
                  set to "Daily", "Weekly", or "Monthly".
                type: string
              minute:
                description: Numeric value indicating the minute of the hour (0 -
                  59) to execute the schedule. This field is present if granularity
                  is set to "Hourly", "Daily", "Weekly", or "Monthly".
                type: string
              recurrenceRule:
                description: |-
                  String containing an RFC-5545 Section 3.8.5.3. Recurrence Rule.
                  For the DTSTART parameter, only UTC timestamps (denoted by the "Z" suffix) are supported, and only timestamps before the current time are supported.
                  For the RECUR rule parts, "FREQ", "INTERVAL", "BYMINUTE", "BYHOUR", "BYDAY", "BYMONTHDAY" are the only rule parts supported.
                  For the FREQ rule part, "MINUTELY", "HOURLY", "DAILY", "WEEKLY", "MONTHLY" are the only values supported.
                  Note that the "INTERVAL" rule part is required when "FREQ" is set to "MINUTELY" and must not be less than 5.
                  This field is only present if granularity is set to "Custom".
                type: string
              replicateSnapshotReclaimPolicy:
                default: Retain
                description: |-
                  ReplicateSnapshotReclaimPolicy defines what happens to a replicateSnapshot when the ReplicateSnapshot CR gets deleted while in retention period (after retention period replicateSnapshot always gets deleted).
                  Valid options are Retain (default), Delete.
                enum:
                - Retain
                - Delete
                type: string
              replicationRetention:
                default: "0"
                description: Indicates how many replicateSnapshots to retain. Zero
                  indicates that no replicateSnapshots should be created.
                maxLength: 63
                minLength: 0
                pattern: ^(0|([1-9][0-9]*))$
                type: string
              snapshotReclaimPolicy:
                default: Delete
                description: |-
                  SnapshotReclaimPolicy defines what happens to a snapshot when the Snapshot CR gets deleted while in retention period (after retention period snapshot always gets deleted).
                  Valid options are Delete (default), Retain.
                enum:
                - Retain
                - Delete
                type: string
              snapshotRetention:
                description: Indicates how many snapshots to retain. Zero indicates
                  that no snapshots should be created.
                maxLength: 63
                minLength: 0
                pattern: ^(0|([1-9][0-9]*))$
                type: string
            required:
            - applicationRef
            - backupRetention
            - granularity
            - snapshotRetention
            type: object
          status:
            description: ScheduleStatus defines the observed state of Schedule
            properties:
              error:
                description: Error indicates the most recent error that has occurred.
                  The error may not be permanent, so progress may continue after temporarily
                  seeing an error.
                type: string
              lastRecoveryPoints:
                description: LastRecoveryPoints stores the last backup, snapshot,
                  and replicate snapshot created by the schedule
                properties:
                  backup:
                    properties:
                      creationTimestamp:
                        format: date-time
                        type: string
                      name:
                        type: string
                    type: object
                  creationTimestamp:
                    format: date-time
                    type: string
                  isHealthy:
                    type: boolean
                  replicateSnapshot:
                    properties:
                      creationTimestamp:
                        format: date-time
                        type: string
                      name:
                        type: string
                    type: object
                  snapshot:
                    properties:
                      creationTimestamp:
                        format: date-time
                        type: string
                      name:
                        type: string
                    type: object
                type: object
              lastScheduleTime:
                format: date-time
                type: string
              state:
                description: State indicates the current state of the Schedule
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
