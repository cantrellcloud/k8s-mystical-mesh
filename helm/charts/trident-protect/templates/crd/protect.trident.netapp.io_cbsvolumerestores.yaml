---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.3
  name: cbsvolumerestores.protect.trident.netapp.io
spec:
  group: protect.trident.netapp.io
  names:
    kind: CBSVolumeRestore
    listKind: CBSVolumeRestoreList
    plural: cbsvolumerestores
    singular: cbsvolumerestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.error
      name: Error
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: CBSVolumeRestore is the Schema for the CBSVolumeRestores API  (only
          available with NetApp Backup and Recovery service)
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CBSVolumeRestoreSpec defines the desired state of CBSVolumeRestore
            properties:
              pvcName:
                description: SourcePvcName is the name of the PVC to restore
                type: string
              pvcSourceNamespace:
                description: SourcePvcNamespace is the namespace of the PVC to restore
                type: string
              pvcTargetNamespace:
                description: TargetPvcNamespace is the namespace in which the restored
                  PVC will be created
                type: string
              restoreToReplicationSource:
                default: false
                description: |-
                  RestoreToReplicationSource indicates whether the restore should be done to the replication source volume.
                  This is only applicable for LOCAL restores and defaults to false.
                type: boolean
              restoreType:
                description: |-
                  RestoreType is the type of restore to perform, CLOUD or LOCAL (defaults to CLOUD).
                  CLOUD Indicates a restore from a CBS snapshot in the cloud.
                  LOCAL Indicates a restore from an ONTAP volume.
                enum:
                - CLOUD
                - LOCAL
                type: string
              restoreVolumeName:
                description: |-
                  RestoreVolumeName is the name of the volume to restore to.
                  If not specified a temporary volume name will be created.
                type: string
              source:
                description: Source is the source of the restore
                properties:
                  bucket:
                    description: Bucket is the name of the bucket that contains the
                      CBS backup
                    type: string
                  cbsVolumeID:
                    description: CBSVolumeID is the ID of the CBS volume to restore
                    type: string
                  cbsVolumeName:
                    description: CBSVolumeName is the name of the CBS volume to restore
                    type: string
                  snapshotName:
                    description: SnapshotName is the name of the CBS snapshot to restore
                    type: string
                  systemID:
                    description: SystemID is the ID of the system that the PV belongs
                      to
                    type: string
                  systemName:
                    description: SystemName is the name of the system that the PV
                      belongs to
                    type: string
                required:
                - bucket
                - cbsVolumeID
                - cbsVolumeName
                - snapshotName
                type: object
              targetStorageClass:
                description: TargetStorageClass is the storage class for the target
                  PVC
                type: string
            required:
            - source
            type: object
          status:
            description: CBSVolumeRestoreStatus defines the observed state of CBSVolumeRestore
            properties:
              aggregate:
                description: Aggregate is the name of the aggregate that the volume
                  should be restored to
                type: string
              completionTimestamp:
                description: |-
                  CompletionTimestamp records the time the CBSVolumeRestore completed.
                  The server's time is used for CompletionTimestamps
                format: date-time
                nullable: true
                type: string
              conditions:
                description: Each Condition contains details for one aspect of the
                  current state of the CBSVolumeBackup.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              error:
                description: Error indicates the most recent error that has occurred.
                  The error may not be permanent, so progress may continue after temporarily
                  seeing an error.
                type: string
              jobID:
                description: JobID is the ID of the CBS restore job
                type: string
              restoredPVName:
                description: RestoredPVName is the name of the restored PV
                type: string
              state:
                description: State indicates a high level summary of the CBSVolumeRestore's
                  state
                type: string
              svm:
                description: Svm is the name of the storage virtual machine that volume
                  should be restored to
                type: string
              systemID:
                description: SystemID is the ID of the system that the PV belongs
                  to
                type: string
              systemName:
                description: SystemName is the name of the system that the PV belongs
                  to
                type: string
              systemProtectionJobID:
                description: SystemProtectionJobID is the ID of the system protection
                  job
                type: string
              targetBackendUUID:
                description: TargetBackendUUID UUID of the TridentBackend to use for
                  trident volume import
                type: string
              targetStorageClass:
                description: TargetStorageClass is the storage class for the target
                  PVC
                type: string
              targetVolumeName:
                description: TargetVolumeName is the name of the target volume
                type: string
              targetVolumeSize:
                description: TargetVolumeSize is the size of the target volume
                format: int64
                type: integer
              tempCBSVolumeName:
                description: TempCBSVolumeName is the name of the temporary CBS volume
                  created for the restore
                type: string
            required:
            - aggregate
            - conditions
            - state
            - svm
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
