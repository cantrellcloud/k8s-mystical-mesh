  condition: operator.enabled
  name: kube-prometheus-stack
  repository: https://prometheus-community.github.io/helm-charts
  version: 75.9.0
- alias: grafana
  condition: grafana.enabled
  name: grafana-operator
  repository: oci://ghcr.io/grafana/helm-charts
