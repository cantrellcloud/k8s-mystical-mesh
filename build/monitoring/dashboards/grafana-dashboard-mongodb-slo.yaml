apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mongodb-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mongodb-slo.json: |
    {
      "title": "MongoDB SLOs (Rocket.Chat)",
      "uid": "mongodb-slo",
      "schemaVersion": 39,
      "version": 1,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "query",
            "datasource": "$datasource",
            "label": "Cluster",
            "query": "label_values(mongodb_mongod_replset_member_replication_lag, cluster)",
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "type": "gauge",
          "title": "Replication Lag p95 (s)",
          "id": 10,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "quantile_over_time(0.95, max by (cluster, replicaset) (mongodb_mongod_replset_member_replication_lag{app_kubernetes_io_instance=\"rocketchat\",cluster=~\"$cluster\"})[1h])",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Replication Lag per Member",
          "id": 11,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "mongodb_mongod_replset_member_replication_lag{app_kubernetes_io_instance=\"rocketchat\",cluster=~\"$cluster\"}",
              "legendFormat": "{{replicaset}} / {{member_state}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Active Connections",
          "id": 12,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "connections"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (cluster) (mongodb_connections{app_kubernetes_io_instance=\"rocketchat\",cluster=~\"$cluster\"})",
              "refId": "A"
            }
          ]
        }
      ]
    }
