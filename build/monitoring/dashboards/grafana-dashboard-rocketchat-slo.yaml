apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-rocketchat-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  rocketchat-slo.json: |
    {
      "title": "Rocket.Chat SLOs",
      "uid": "rocketchat-slo",
      "schemaVersion": 39,
      "version": 1,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "query",
            "datasource": "$datasource",
            "label": "Cluster",
            "query": "label_values(up{job=\"rocketchat\"}, cluster)",
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "type": "gauge",
          "title": "API Availability (5xx error budget)",
          "id": 1,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 - ( 100 * sum(rate(http_requests_total{job=\"rocketchat\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"rocketchat\"}[5m])) )",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          }
        },
        {
          "type": "timeseries",
          "title": "API Latency p95",
          "id": 2,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"rocketchat\",route=~\"/api/.*\"}[5m])))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "API 5xx Error Rate",
          "id": 3,
          "datasource": "$datasource",
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{job=\"rocketchat\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"rocketchat\"}[5m]))",
              "refId": "A"
            }
          ]
        }
      ]
    }
