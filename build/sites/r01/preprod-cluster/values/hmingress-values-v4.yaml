global:
  imageRegistry: "altregistry.dev.kube:8443/library"
  imagePullSecrets: []
  defaultStorageClass: "tkg-work-storage-latebinding"
  storageClass: "tkg-work-storage-latebinding"
  security:
    allowInsecureImages: true

nameOverride: "hypermute"
fullnameOverride: "hypermute"
namespaceOverride: "hypermute-ingress"

contour:
  enabled: true
  manageCRDs: false
  #envoyServiceNamespace: hypermute
  #rootNamespaces: hypermute
  image:
    pullPolicy: IfNotPresent
    pullSecrets: []
  replicaCount: 1
  resources: {}
  podAffinityPreset: ""
  podAntiAffinityPreset: soft
  nodeAffinityPreset:
    type: ""
    key: ""
    values: []
  affinity: {}
  ingressClass:
    name: hypermute
    create: true
    default: false

envoy:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    pullSecrets: []
  kind: daemonset
  replicaCount: 1
  podAffinityPreset: ""
  podAntiAffinityPreset: ""
  nodeAffinityPreset:
    type: ""
    key: ""
    values: []
  affinity: {}
  service:
    type: LoadBalancer
    loadBalancerIP: 10.22.1.245

metrics:
  serviceMonitor:
    namespace: ""
    enabled: false
    jobLabel: "app.kubernetes.io/name"
    interval: ""
    metricRelabelings: []
    relabelings: []
    honorLabels: false
    scrapeTimeout: ""
    selector: {}
    labels: {}
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    rules: []
