istio_namespace: "istio-system"

auth:
  strategy: "anonymous"

deployment:
  image_name: altregistry.dev.kube:8443/library/kiali/kiali
  image_pull_policy: "Always"
  image_pull_secrets: []
  image_version: v2.13.0
  ingress:
    additional_labels: {}
    class_name: "contour"
    #enabled:
    override_yaml:
      metadata: {}
  instance_name: "kiali"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

external_services:
  custom_dashboards:
    enabled: true
  istio:
    root_namespace: "istio-system"
  prometheus:
    url: "http://j64manager-prometheus.monitoring.svc:9090"
  grafana:
    url: "http://prometheus-grafana.monitoring.svc"

server:
  port: 20001
  #node_port:
  observability:
    metrics:
      enabled: true
      port: 9090
  web_root: ""
