_internal_defaults_do_not_set:
  revision: "stable"
  meshConfig:
    enablePrometheusMerge: false
    trustDomain: cluster.local
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  global:
    meshID: preprod-mesh1
    multiCluster:
      enabled: true
      clusterName: j52domain
    network: j52domain-net1
    istioNamespace: istio-system
    certSigners:
      - clusterissuers.cert-manager.io/preprod-ca-clusterissuer

    defaultResources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1024Mi

    hub: "altregistry.dev.kube:8443/library/istio"
    tag: "1.27.1"
    imagePullPolicy: "IfNotPresent"
    imagePullSecrets: []

    logging:
      level: "default:debug"

    proxy:
      logLevel: debug

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 1000m
          memory: 512Mi
    meshNetworks:
      j64manager-net1:
        endpoints:
        - fromRegistry: j64manager
        gateways:
        - address: 10.0.4.59
          port: 15443
      j64domain-net1:
        endpoints:
        - fromRegistry: j64domain
        gateways:
        - address: 10.0.4.69
          port: 15443
      j52domain-net1:
        endpoints:
        - fromRegistry: j52domain
        gateways:
        - address: 10.0.4.89
          port: 15443
      r01domain-net1:
        endpoints:
        - fromRegistry: r01domain
        gateways:
        - address: 10.0.4.109
          port: 15443
