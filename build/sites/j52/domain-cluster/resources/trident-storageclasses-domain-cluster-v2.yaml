apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tridentsvm-netapp-nfs-immediate
provisioner: csi.trident.netapp.io
parameters:
  storagePools: "optix-nfs-backend:.*"
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tridentsvm-netapp-nfs-latebinding
provisioner: csi.trident.netapp.io
parameters:
  storagePools: "optix-nfs-backend:.*"
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
