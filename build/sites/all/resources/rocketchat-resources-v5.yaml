# rocketchat-tls-certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rocketchat-cert
  namespace: rocketchat
spec:
  secretName: rocketchat-tls
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
  commonName: rocket.dev.local
  dnsNames:
    - rocket.dev.local
---
# rocketchat-ingress
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: rocketchat-proxy
  namespace: rocketchat
spec:
  virtualhost:
    fqdn: rocket.dev.local
    tls:
      secretName: rocketchat-tls
  routes:
    - services:
        - name: rocketchat-rocketchat
          port: 80
      enableWebsockets: true
      loadBalancerPolicy:
        strategy: Cookie
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rocketchat-rocketchat-hpa
  namespace: rocketchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rocketchat-rocketchat
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rocketchat-ddp-streamer-hpa
  namespace: rocketchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rocketchat-ddp-streamer
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
