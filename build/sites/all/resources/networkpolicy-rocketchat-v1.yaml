apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketchat-main
  namespace: rocketchat
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rocketchat
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from Contour ingress
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: contour
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow from Prometheus for metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  
  egress:
  # Allow to MongoDB
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: mongodb
    ports:
    - protocol: TCP
      port: 27017
  
  # Allow to NATS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: nats-system
    ports:
    - protocol: TCP
      port: 4222
  
  # Allow to Istio control plane for xDS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
    ports:
    - protocol: TCP
      port: 15012
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow to Kubernetes API
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketchat-presence
  namespace: rocketchat
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: presence
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from main Rocket.Chat pods
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: rocketchat
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow from Prometheus for metrics
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  
  egress:
  # Allow to NATS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: nats-system
    ports:
    - protocol: TCP
      port: 4222
  
  # Allow to main Rocket.Chat pods
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: rocketchat
    ports:
    - protocol: TCP
      port: 3000
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
