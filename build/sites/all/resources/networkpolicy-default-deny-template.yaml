# Default Deny NetworkPolicies
# Apply these to each namespace to establish a default-deny posture
# Then layer specific allow policies on top
#
# Usage:
#   sed 's/${NAMESPACE}/rocketchat/g' networkpolicy-default-deny-template.yaml | kubectl apply -f -

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: ${NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-egress
  namespace: ${NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress

---
# Allow DNS egress (commonly needed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ${NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow to kube-dns/core-dns
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
