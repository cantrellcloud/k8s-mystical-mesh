apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-replicaset
  namespace: mongodb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from Rocket.Chat
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rocketchat
    ports:
    - protocol: TCP
      port: 27017
  
  # Allow from MongoDB Operator
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: mongodb-operator
    ports:
    - protocol: TCP
      port: 27017
  
  # Allow from Prometheus (MongoDB Exporter sidecar)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9216
  
  # Allow inter-replica communication (same namespace)
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mongodb
    ports:
    - protocol: TCP
      port: 27017
  
  egress:
  # Allow to other MongoDB replicas (same namespace)
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mongodb
    ports:
    - protocol: TCP
      port: 27017
  
  # Allow to MongoDB replicas in other clusters via Istio east-west gateway
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
    ports:
    - protocol: TCP
      port: 15443
  
  # Allow to MongoDB Operator for health checks and management
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: mongodb-operator
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow to Kubernetes API
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-exporter
  namespace: mongodb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb-exporter
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9216
  
  egress:
  # Allow to MongoDB pods
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mongodb
    ports:
    - protocol: TCP
      port: 27017
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
