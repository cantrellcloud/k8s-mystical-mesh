      port: 80
      protocol: TCP
      targetPort: http
    - name: https
      port: 443
      protocol: TCP
      targetPort: https
  selector:
    app.kubernetes.io/component: envoy
    app.kubernetes.io/instance: hypermute
    app.kubernetes.io/name: hypermute
