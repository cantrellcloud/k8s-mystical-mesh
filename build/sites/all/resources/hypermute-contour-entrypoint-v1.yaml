      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contour-hypermute
  namespace: contour-hypermute
  labels:
    app: contour-hypermute
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
  selector:
    matchLabels:
      app: contour-hypermute
  template:
    metadata:
      labels:
        app: contour-hypermute
    spec:
      serviceAccountName: contour-hypermute
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: contour-hypermute
      containers:
        - name: contour
          image: ghcr.io/projectcontour/contour:v1.33.2
          imagePullPolicy: IfNotPresent
          command: ["contour"]
          args:
            - serve
            - --incluster
            - --xds-address=0.0.0.0
            - --xds-port=8001
            - --contour-cafile=/certs/ca.crt
            - --contour-cert-file=/certs/tls.crt
            - --contour-key-file=/certs/tls.key
            - --config-path=/config/contour.yaml
            - --ingress-class-name=hypermute
          env:
            - name: CONTOUR_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          ports:
            - name: xds
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 8000
              protocol: TCP
            - name: debug
              containerPort: 6060
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          readinessProbe:
            tcpSocket:
              port: 8001
            periodSeconds: 10
          volumeMounts:
            - name: contourcert
              mountPath: /certs
              readOnly: true
            - name: contour-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: contourcert
          secret:
            secretName: contourcert
        - name: contour-config
          configMap:
            name: contour-hypermute
            defaultMode: 0644
            items:
              - key: contour.yaml
                path: contour.yaml
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: envoy-hypermute
  namespace: contour-hypermute
  labels:
    app: envoy-hypermute
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  selector:
    matchLabels:
      app: envoy-hypermute
  template:
    metadata:
      labels:
        app: envoy-hypermute
    spec:
      serviceAccountName: envoy-hypermute
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      initContainers:
        - name: envoy-initconfig
          image: ghcr.io/projectcontour/contour:v1.33.2
          imagePullPolicy: IfNotPresent
          command:
            - contour
          args:
            - bootstrap
            - /config/envoy.json
            - --xds-address=contour-hypermute
            - --xds-port=8001
            - --xds-resource-version=v3
            - --resources-dir=/config/resources
            - --envoy-cafile=/certs/ca.crt
            - --envoy-cert-file=/certs/tls.crt
            - --envoy-key-file=/certs/tls.key
          env:
            - name: CONTOUR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: envoy-config
              mountPath: /config
            - name: envoycert
              mountPath: /certs
              readOnly: true
      containers:
        - name: shutdown-manager
          image: ghcr.io/projectcontour/contour:v1.33.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/contour
          args:
            - envoy
            - shutdown-manager
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/contour
                  - envoy
                  - shutdown
          volumeMounts:
            - name: envoy-admin
              mountPath: /admin
        - name: envoy
          image: docker.io/envoyproxy/envoy:distroless-v1.35.9
          imagePullPolicy: IfNotPresent
          command:
            - envoy
          args:
            - -c
            - /config/envoy.json
            - --service-cluster
            - $(CONTOUR_NAMESPACE)
            - --service-node
            - $(ENVOY_POD_NAME)
            - --log-level
            - info
          env:
            - name: CONTOUR_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: ENVOY_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: metrics
              containerPort: 8002
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 4
          lifecycle:
            preStop:
              httpGet:
                path: /shutdown
                port: 8090
                scheme: HTTP
          volumeMounts:
            - name: envoy-config
              mountPath: /config
              readOnly: true
            - name: envoycert
              mountPath: /certs
              readOnly: true
            - name: envoy-admin
              mountPath: /admin
      volumes:
        - name: envoy-admin
          emptyDir: {}
        - name: envoy-config
          emptyDir: {}
        - name: envoycert
          secret:
            secretName: envoycert
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: hypermute
spec:
  # Keep this stable once created. spec.controller is immutable.
  controller: projectcontour.io/contour-hypermute
