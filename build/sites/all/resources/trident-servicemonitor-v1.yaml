apiVersion: v1
kind: Service
metadata:
  name: trident-metrics
  namespace: trident-system
  labels:
    app: trident.netapp.io
    release: prometheus
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8443
    targetPort: 8443
    protocol: TCP
  selector:
    app: trident.netapp.io
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trident-operator
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: trident.netapp.io
  namespaceSelector:
    matchNames:
    - trident-system
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
