apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-cluster
  namespace: nats-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from Rocket.Chat
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rocketchat
    ports:
    - protocol: TCP
      port: 4222
  
  # Allow from Prometheus for monitoring endpoint
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 8222
    - protocol: TCP
      port: 7777
  
  # Allow inter-cluster NATS communication
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: nats
    ports:
    - protocol: TCP
      port: 6222
  
  egress:
  # Allow to other NATS pods (cluster routing)
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: nats
    ports:
    - protocol: TCP
      port: 6222
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-exporter
  namespace: nats-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-nats-exporter
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow from Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 7777
  
  egress:
  # Allow to NATS monitoring endpoint
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: nats
    ports:
    - protocol: TCP
      port: 8222
  
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
