---
# This is a CA issuer for cert-manager. It uses the CA secret to sign certificates.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: preprod-ca-clusterissuer
spec:
  ca:
    secretName: preprod-ca-secret
---
# This is a CA issuer for cert-manager. It uses the CA secret to sign certificates.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ca-issuer
  namespace: cert-manager
spec:
  ca:
    secretName: preprod-ca-secret
