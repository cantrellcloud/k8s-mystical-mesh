apiVersion: v1
kind: Secret
metadata:
  name: hmkeycloak-bootstrap-admin
  namespace: keycloak
type: Opaque
data:
  # base64-encoded username: bootstrap-admin
  username: Ym9vdHN0cmFwLWFkbWlu
  # base64-encoded password: def5
  password: WkFRd3N4IUAjJCUxMjM0NQ==
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hmkeycloak-claims
  namespace: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: tridentsvm-nfs-latebinding
  resources:
    requests:
      storage: 5Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmkeycloak-hypermute-cloud-cert
  namespace: keycloak
spec:
  secretName: hmkeycloak-hypermute-cloud-tls
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
  commonName: hmkeycloak.hypermute.cloud
  dnsNames:
    - hmkeycloak.hypermute.cloud
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: keycloak
    app.kubernetes.io/instance: hmkeycloak
    app.kubernetes.io/managed-by: keycloak-operator
  name: hmkeycloak-ingress
  namespace: keycloak
spec:
  ingressClassName: hypermute
  tls:
    - hosts:
        - hmkeycloak.hypermute.cloud
      secretName: hmkeycloak-hypermute-cloud-tls
  rules:
    - host: hmkeycloak.hypermute.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hmkeycloak-service
                port:
                  name: http
