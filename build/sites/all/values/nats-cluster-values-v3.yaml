global:
  image:
    pullPolicy:
    pullSecretNames: []
    registry: altregistry.dev.kube:8443/library
  labels: {}

nameOverride:
fullnameOverride:
namespaceOverride: nats-system

tlsCA:
  enabled: false
  configMapName:
  secretName:
  dir: /etc/nats-ca-cert
  key: ca.crt

config:
  cluster:
    enabled: true
    port: 6222
    replicas: 3
    routeURLs:
      user:
      password:
      useFQDN: true
      k8sClusterDomain: cluster.local
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/cluster
      cert: tls.crt
      key: tls.key
  nats:
    port: 4222
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/nats
      cert: tls.crt
      key: tls.key
  monitor:
    enabled: true
    port: 8222
    tls:
      enabled: false
    pvc:
      enabled: true
      size: 1Gi
      storageClassName: tridentsvm-nfs-latebinding
      name:

container:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 360Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

promExporter:
  enabled: true
  image:
    repository: natsio/prometheus-nats-exporter
    tag: 0.17.3
    pullPolicy: IfNotPresent
    registry: altregistry.dev.kube:8443/library
    digest:
    fullImageName:
  port: 7777
  monitorDomain: localhost
  env: {}
  podMonitor:
    enabled: true
    name: nats-exporter
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 200m
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

