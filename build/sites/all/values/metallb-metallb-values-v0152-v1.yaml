imagePullSecrets: []
rbac:
  create: true

prometheus:
  scrapeAnnotations: false
  rbacPrometheus: true

controller:
  enabled: true
  logLevel: debug
  webhookMode: enabled
  image:
    repository: altregistry.dev.kube:8443/library/metallb/controller
    tag: v0.15.2
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 500m
      memory: 512Mi

speaker:
  enabled: true
  logLevel: debug
  image:
    repository: altregistry.dev.kube:8443/library/metallb/speaker
    tag: v0.15.2
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 500m
      memory: 512Mi
  frr:
    enabled: true
    image:
      repository: altregistry.dev.kube:8443/library/frrouting/frr
      tag: 10.4.1
      pullPolicy: IfNotPresent

crds:
  enabled: true
  validationFailurePolicy: Fail