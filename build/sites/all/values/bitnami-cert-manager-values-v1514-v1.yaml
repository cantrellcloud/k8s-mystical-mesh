global:
  imageRegistry: "altregistry.dev.kube:8443/library"
  imagePullSecrets: []
  defaultStorageClass: "tkg-work-storage-latebinding"
  storageClass: "tkg-work-storage-latebinding"
  security:
    allowInsecureImages: true

installCRDs: true
logLevel: 2
replicaCount: 1

controller:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 150m
      memory: 250Mi

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 150m
      memory: 250Mi

cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 150m
      memory: 250Mi

metrics:
  enabled: true

rbac:
  create: true
