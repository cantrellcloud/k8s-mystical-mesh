_internal_defaults_do_not_set:
  name: "istio-eastwestgateway-j64manager"
  revision: "stable"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2000m
      memory: 1024Mi

  hub: "altregistry.dev.kube:8443/library/istio"
  tag: "1.27.1"
  imagePullPolicy: "IfNotPresent"
  imagePullSecrets: []

  service:
    type: LoadBalancer
    loadBalancerIP: 10.0.4.39
    ports:
    - name: tls
      port: 15443
      targetPort: 15443
    - name: tcp-istiod
      port: 15012
      targetPort: 15012
    - name: tcp-webhook
      port: 15017
      targetPort: 15017
  labels:
    istio: istio-eastwestgateway-j64manager
    topology.istio.io/network: j64manager-net1

networkGateway: j64manager-net1
