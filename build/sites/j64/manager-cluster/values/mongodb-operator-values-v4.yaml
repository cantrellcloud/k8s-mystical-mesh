managedSecurityContext: false
operator:
  env: prod
  mdbDefaultArchitecture: static
  name: mongodb-kubernetes-operator
  operator_image_name: mongodb-kubernetes
  deployment_name: mongodb-kubernetes-operator
  version: 1.5.0
  watchNamespace: mongodb
  watchedResources:
  - opsmanagers
  - mongodb
  - mongodbmulticluster
  - mongodbusers
  resources:
    requests:
      cpu: 500m
      memory: 300Mi
    limits:
      cpu: '1'
      memory: 1Gi
  vaultSecretBackend:
    enabled: false
    tlsSecretRef: ''
  replicas: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
mongodb:
  name: mongodb-enterprise-server
  repo: altregistry.dev.kube:8443/library/mongodb
  appdbAssumeOldFormat: false
  imageType: ubi8
registry:
  imagePullSecrets: null
  pullPolicy: Always
  operator: altregistry.dev.kube:8443/library/mongodb
  database: altregistry.dev.kube:8443/library/mongodb
  initDatabase: altregistry.dev.kube:8443/library/mongodb
  initOpsManager: altregistry.dev.kube:8443/library/mongodb
  opsManager: altregistry.dev.kube:8443/library/mongodb
  initAppDb: altregistry.dev.kube:8443/library/mongodb
  appDb: altregistry.dev.kube:8443/library/mongodb
  agent: altregistry.dev.kube:8443/library/mongodb
  versionUpgradeHook: altregistry.dev.kube:8443/library/mongodb
multiCluster:
  clusters:
    [
      "j64manager",
      "j64domain",
      "j52domain",
      "r01domain",
    ]
  kubeConfigSecretName: mongodb-enterprise-operator-multi-cluster-kubeconfig
  performFailOver: true
  clusterClientTimeout: 10
  needsCAInfrastructure: true
