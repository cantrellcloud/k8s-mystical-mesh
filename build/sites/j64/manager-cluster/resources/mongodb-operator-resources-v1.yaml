apiVersion: v1
kind: Service
metadata:
  name: mongodb-kubernetes-operator-metrics
  namespace: mongodb-operator
  labels:
    app.kubernetes.io/name: mongodb-kubernetes-operator
    release: prometheus
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/name: mongodb-kubernetes-operator
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-operator
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb-kubernetes-operator
  namespaceSelector:
    matchNames:
    - mongodb-operator
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
