# rocketchat-dbuser-rktservice
apiVersion: mongodb.com/v1
kind: MongoDBUser
metadata:
  name: rocketchat-db-dbuser-rktservice
  namespace: mongodb
spec:
  username: rktservice
  connectionStringSecretName: rocketchat-db-dbuser-rktservice-secret
  db: admin
  passwordSecretKeyRef:
    name: rocketchat-db-dbuser-rktservice-credentials
    key: password
  mongodbResourceRef:
    name: rocketchat-db
  roles:
    - db: admin
      name: readWrite
    - db: rocketchat
      name: dbAdmin
    - db: rocketchat
      name: readWrite
    - db: local
      name: readWrite
