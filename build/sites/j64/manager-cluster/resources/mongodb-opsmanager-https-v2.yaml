# mongodb-project-configmap
#apiVersion: v1
#kind: ConfigMap
#metadata:
#  name: preprod
#  namespace: mongodb
#data:
#  projectName: preprod
#  orgId: 5b890e0feacf0b76ff3e7813
#  baseUrl: https://opsmanager.dev.kube:8443
#  sslMMSCAConfigMap: opsmanger-devcerta001ca
---
# opsmanager-app-setupadmin-credentials
apiVersion: v1
stringData:
  Username: setupadmin@dev.kube
  Password: ZAQwsx!@#123
  FirstName: SetupAdministrator
  LastName: PreProd
kind: Secret
metadata:
  name: opsmanager-app-setupadmin-credentials
  namespace: mongodb
type: Opaque
---
# opsmanager-app-dbuser-credentials
apiVersion: v1
data:
  password: ZzVOamR3YmpVek9EWmVKU29vSlNZbFVDcA==
kind: Secret
metadata:
  name: opsmanager-app-dbuser-credentials
  namespace: mongodb
type: Opaque
---
# mdb-opsmanager-cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mdb-opsmanager-cert
  namespace: mongodb
spec:
  secretName: mdb-opsmanager-cert
  duration: 4380h
  renewBefore: 360h
  commonName: opsmanager.dev.kube
  dnsNames:
  - opsmanager.dev.kube
  usages:
  - digital signature
  - key encipherment
  - data encipherment
  - server auth
  - client auth
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# appdb-opsmanager-db-cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: appdb-opsmanager-db-cert
  namespace: mongodb
spec:
  secretName: appdb-opsmanager-db-cert
  duration: 4380h
  renewBefore: 360h
  commonName: opsmanager-db-svc.mongodb.svc.cluster.local
  dnsNames:
  - opsmanager-db-0
  - opsmanager-db-0.opsmanager-db-svc.mongodb.svc.cluster.local
  - opsmanager-db-1
  - opsmanager-db-1.opsmanager-db-svc.mongodb.svc.cluster.local
  - opsmanager-db-2
  - opsmanager-db-2.opsmanager-db-svc.mongodb.svc.cluster.local
  usages:
  - digital signature
  - key encipherment
  - data encipherment
  - server auth
  - client auth
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# mongodb-opsmanager
apiVersion: mongodb.com/v1
kind: MongoDBOpsManager
metadata:
  name: opsmanager
  namespace: mongodb
spec:
  version: 8.0.15
  replicas: 1
  adminCredentials: opsmanager-app-setupadmin-credentials
  applicationDatabase:
    topology: SingleCluster
    members: 3
    version: 8.0.15-ubi8
    passwordSecretKeyRef:
      name: opsmanager-app-dbuser-credentials
      key: password
    security:
      certsSecretPrefix: appdb
      tls:
        ca: opsmanager-devcerta001ca
    podSpec:
      persistence:
        single:
          storage: 50Gi
          storageClass: tridentsvm-nfs-latebinding
#    statefulSet:
#      spec:
#        template:
#          spec:
#            containers:
#            - name: mongodb
#              resources:
#                requests:
#                  cpu: 1000m
#                  memory: 4Gi
#                limits:
#                  cpu: '2'
#                  memory: 8Gi
#            affinity:
#              podAntiAffinity:
#                preferredDuringSchedulingIgnoredDuringExecution:
#                - weight: 100
#                  podAffinityTerm:
#                    topologyKey: kubernetes.io/hostname
#                    labelSelector:
#                      matchLabels:
#                        app.kubernetes.io/name: opsmanager-db
  backup:
    enabled: false
  configuration:
    automation.versions.source: local
    automation.versions.directory: /mongodb-ops-manager/mongodb-releases/
    baseUrl: https://opsmanager.dev.kube:8443
  externalConnectivity:
    type: LoadBalancer
    loadBalancerIP: 10.0.4.37
  opsManagerURL: https://opsmanager.dev.kube:8443
  security:
    certsSecretPrefix: mdb
    tls:
      ca: opsmanager-devcerta001ca
  topology: SingleCluster
  statefulSet:
    spec:
      volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          storageClassName: tridentsvm-nfs-latebinding
          resources:
            requests:
              storage: 30Gi
      template:
        spec:
          containers:
          - name: mongodb-ops-manager
            resources:
              requests:
                ephemeral-storage: 2Gi
                cpu: 2000m
                memory: 4Gi
              limits:
                ephemeral-storage: 5Gi
                cpu: 4
                memory: 8Gi
            volumeMounts:
            - name: data
              mountPath: /mongodb-ops-manager/mongodb-releases
              subPath: releases
            - name: data
              mountPath: /opt/mongodb/mms/logs
              subPath: logs
            - name: data
              mountPath: /data
              subPath: data
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ops-manager
