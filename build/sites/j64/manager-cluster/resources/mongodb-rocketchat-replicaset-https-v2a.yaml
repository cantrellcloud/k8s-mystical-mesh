# mongodb-rocketchat
apiVersion: mongodb.com/v1
kind: MongoDBMultiCluster
metadata:
  name: rocketchat-db
  namespace: mongodb
spec:
  type: ReplicaSet
  version: 7.0.23  # preprod: 7.0.23
  featureCompatibilityVersion: "7.0"
  logLevel: "DEBUG"
  opsmanager:
    configMapRef:
      name: mongodb-rocketchat-db-project-cm
  credentials: mongodb-organization-access-apikey-credentials
  persistent: true
  duplicateServiceObjects: true
  security:
    certsSecretPrefix: mdb
    tls:
      ca: opsmanager-devcerta001ca
    authentication:
      enabled: true
      modes: [SCRAM, X509]
      requireClientTLSAuthentication: false
      agents:
        mode: X509
        clientCertificateSecretRef:
          name: mdb-rocketchat-db-agent-cert
     # internalCluster: X509
  additionalMongodConfig:
    replication:
      replSetName: rocketchat-rs
  clusterSpecList:
    - clusterName: j64domain
      members: 1
      memberConfig:
        - votes: 1
          priority: "1.5"
      statefulSet:
        spec:
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                storageClassName: tridentsvm-nfs-latebinding
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 150Gi
          template:
            spec:
              containers:
                - name: mongodb-agent
                  image: altregistry.dev.kube:8443/library/mongodb/mongodb-agent:108.0.15.8888-1
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 1
                      memory: 1Gi
                - name: mongodb-enterprise-database
                  resources:
                    requests:
                      cpu: 200m
                      memory: 1Gi
                    limits:
                      cpu: 2
                      memory: 4Gi
    - clusterName: j52domain
      members: 1
      memberConfig:
        - votes: 1
          priority: "1.5"
      statefulSet:
        spec:
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                storageClassName: tridentsvm-nfs-latebinding
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 150Gi
          template:
            spec:
              containers:
                - name: mongodb-agent
                  image: altregistry.dev.kube:8443/library/mongodb/mongodb-agent:108.0.15.8888-1
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 1
                      memory: 1Gi
                - name: mongodb-enterprise-database
                  resources:
                    requests:
                      cpu: 200m
                      memory: 1Gi
                    limits:
                      cpu: 2
                      memory: 4Gi
    - clusterName: r01domain
      members: 1
      memberConfig:
        - votes: 1
          priority: "1.5"
      statefulSet:
        spec:
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                storageClassName: tridentsvm-nfs-latebinding
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 150Gi
          template:
            spec:
              containers:
                - name: mongodb-agent
                  image: altregistry.dev.kube:8443/library/mongodb/mongodb-agent:108.0.15.8888-1
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 1
                      memory: 1Gi
                - name: mongodb-enterprise-database
                  resources:
                    requests:
                      cpu: 200m
                      memory: 1Gi
                    limits:
                      cpu: 2
                      memory: 4Gi
