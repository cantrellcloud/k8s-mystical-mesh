# mdb-rocketchat-db-cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mdb-rocketchat-db-cert
  namespace: mongodb
spec:
  secretName: mdb-rocketchat-db-cert
  duration: 4380h
  renewBefore: 360h
  commonName: rocketchat-db-svc.mongodb.svc.cluster.local
  subject:
    organizations:
     - NGMS
    organizationalUnits:
      - ITSysMgmt-DB-Certs
  dnsNames:
  - "rocketchat-db-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-0-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-1-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-2-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-0-0-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-1-0-svc.mongodb.svc.cluster.local"
  - "rocketchat-db-2-0-svc.mongodb.svc.cluster.local"
  usages:
  - digital signature
  - key encipherment
  - server auth
  - client auth
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
    group: cert-manager.io
---
