apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: j64manager-grafana.dev.kube
  dnsNames:
  - j64manager-grafana.dev.kube
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    projectcontour.io/websocket-routes: /*
spec:
  tls:
  - hosts:
    - j64manager-grafana.dev.kube
    secretName: grafana-tls
  rules:
  - host: j64manager-grafana.dev.kube
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: prometheus-grafana
            port:
              number: 80
  ingressClassName: contour
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alertmanager-cert
  namespace: monitoring
spec:
  secretName: alertmanager-tls
  issuerRef:
    name: preprod-ca-clusterissuer
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: j64manager-alerts.dev.kube
  dnsNames:
  - j64manager-alerts.dev.kube
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: monitoring
  annotations:
    projectcontour.io/websocket-routes: /*
