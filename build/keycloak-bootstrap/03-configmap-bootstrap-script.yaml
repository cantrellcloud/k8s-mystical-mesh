apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-bootstrap-script
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: bootstrap-script
data:
  bootstrap.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    KCADM="/opt/keycloak/bin/kcadm.sh"

    log() {
      echo
      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"
    }

    kc() {
      "${KCADM}" "$@"
    }

    # Extracts the first JSON string field value from stdin for a given field name.
    # This avoids depending on jq (not present in the upstream Keycloak image).
    json_first_string_field() {
      local field="$1"
      sed -n 's/.*"'"${field}"'"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1
    }

    realm_exists() {
      kc get "realms/${KC_TARGET_REALM}" >/dev/null 2>&1
    }

    client_uuid() {
      kc get clients -r "${KC_TARGET_REALM}" -q clientId="$1" --fields id,clientId | json_first_string_field id
    }

    role_exists() {
      kc get "roles/$1" -r "${KC_TARGET_REALM}" >/dev/null 2>&1
    }

    wait_for_keycloak() {
      log "Waiting for Keycloak API at ${KC_URL}..."
      local url_no_scheme hostport host port scheme_default_port
      url_no_scheme="${KC_URL#*://}"
      hostport="${url_no_scheme%%/*}"
      host="${hostport%%:*}"
      port="${hostport##*:}"
      if [[ "${hostport}" == "${host}" ]]; then
        if [[ "${KC_URL}" == https://* ]]; then
          scheme_default_port=443
        else
          scheme_default_port=80
        fi
        port="${scheme_default_port}"
      fi

      for _ in $(seq 1 60); do
        # Fast check: is the TCP port reachable?
        if timeout 2 bash -lc "</dev/tcp/${host}/${port}" >/dev/null 2>&1; then
          # Slow check: authenticate once to confirm the API is actually usable.
          if kc config credentials --server "${KC_URL}" --realm "${KC_ADMIN_REALM}" --user "${KC_ADMIN_USER}" --password "${KC_ADMIN_PASSWORD}" >/dev/null 2>&1; then
            log "Keycloak API is reachable (authenticated)."
            return 0
          fi
        fi
        sleep 10
      done
      echo "Timed out waiting for Keycloak API at ${KC_URL}" >&2
      return 1
    }

    login_admin() {
      log "Authenticating with kcadm.sh..."
      kc config credentials --server "${KC_URL}" --realm "${KC_ADMIN_REALM}" --user "${KC_ADMIN_USER}" --password "${KC_ADMIN_PASSWORD}"
    }

    ensure_realm() {
      if realm_exists; then
        log "Realm ${KC_TARGET_REALM} already exists."
      else
        log "Creating realm ${KC_TARGET_REALM}..."
        kc create realms       -s realm="${KC_TARGET_REALM}"       -s enabled=true       -s registrationAllowed=false       -s registrationEmailAsUsername=false       -s loginWithEmailAllowed=true       -s duplicateEmailsAllowed=false       -s resetPasswordAllowed=true       -s editUsernameAllowed=false       -s verifyEmail=false       -s bruteForceProtected=true       -s accessTokenLifespan=300       -s accessTokenLifespanForImplicitFlow=300       -s ssoSessionIdleTimeout=1800       -s ssoSessionMaxLifespan=28800       -s revokeRefreshToken=true       -s refreshTokenMaxReuse=0
      fi
    }

    ensure_ldap_provider() {
      local provider_name="ad-ldap"
      # In Keycloak 26, LDAP user federation providers are stored as Components.
      # Use the realm UUID as parentId; kc get components expects the parentId to be the realm id.
      local realm_id
      realm_id=$(kc get "realms/${KC_TARGET_REALM}" --fields id | json_first_string_field id || true)
      if [[ -z "${realm_id}" ]]; then
        log "Could not determine realm id for ${KC_TARGET_REALM}; aborting LDAP provider creation."
        return 1
      fi
      # Remove any legacy components that were created with the realm NAME as parentId
      # (older bootstrap runs used the realm name which can cause sync errors).
      log "Removing legacy components with parentId=${KC_TARGET_REALM} (if any)..."
      for cid in $(kc get components -r "${KC_TARGET_REALM}" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"\]*\)".*/\1/p' || true); do
        if kc get components/${cid} -r "${KC_TARGET_REALM}" | grep -q "\"parentId\"[[:space:]]*:[[:space:]]*\"${KC_TARGET_REALM}\""; then
          log "Deleting legacy component ${cid} (parentId=${KC_TARGET_REALM})"
          kc delete components/${cid} -r "${KC_TARGET_REALM}" || true
        fi
      done

      # If a provider already exists with the correct parentId (realm UUID), skip creation
      if kc get components -r "${KC_TARGET_REALM}" -q parent="${realm_id}" -q type=org.keycloak.storage.UserStorageProvider \
        | grep -q '"name"'[[:space:]]*:[[:space:]]*"'"${provider_name}'"'; then
        log "LDAP federation provider ${provider_name} already exists."
        return 0
      fi
      log "Creating LDAP federation provider ${provider_name}..."
      # Create the component and capture its id (-i prints id)
      local comp_id
      comp_id=$(kc create components -r "${KC_TARGET_REALM}" \
        -s name="${provider_name}" \
        -s providerId=ldap \
        -s providerType=org.keycloak.storage.UserStorageProvider \
        -s parentId="${realm_id}" \
        -s 'config.priority=["0"]' \
        -s 'config.enabled=["true"]' \
        -s "config.vendor=[\"${LDAP_VENDOR}\"]" \
        -s "config.connectionUrl=[\"${LDAP_CONNECTION_URL}\"]" \
        -s "config.usersDn=[\"${LDAP_USERS_DN}\"]" \
        -s "config.bindDn=[\"${LDAP_BIND_DN}\"]" \
        -s "config.bindCredential=[\"${LDAP_BIND_CREDENTIAL}\"]" \
        -s "config.usernameLDAPAttribute=[\"${LDAP_USERNAME_ATTR}\"]" \
        -s "config.rdnLDAPAttribute=[\"${LDAP_RDN_ATTR}\"]" \
        -s "config.uuidLDAPAttribute=[\"${LDAP_UUID_ATTR}\"]" \
        -s "config.userObjectClasses=[\"${LDAP_USER_OBJECT_CLASSES}\"]" \
        -s "config.searchScope=[\"${LDAP_SEARCH_SCOPE}\"]" \
        -s "config.editMode=[\"${LDAP_EDIT_MODE}\"]" \
        -s "config.importEnabled=[\"${LDAP_IMPORT_USERS}\"]" \
        -s "config.syncRegistrations=[\"${LDAP_SYNC_REGISTRATIONS}\"]" \
        -s "config.pagination=[\"${LDAP_PAGINATION}\"]" \
        -s "config.useTruststoreSpi=[\"${LDAP_USE_TRUSTSTORE_SPI}\"]" \
        -s 'config.connectionPooling=["true"]' \
        -s 'config.allowKerberosAuthentication=["false"]' \
        -s 'config.batchSizeForSync=["1000"]' \
        -s 'config.fullSyncPeriod=["-1"]' \
        -s 'config.changedSyncPeriod=["-1"]' \
        -s 'config.cachePolicy=["DEFAULT"]' -i || true)

      if [[ -n "${comp_id}" ]]; then
        log "Created new component with id '${comp_id}'"
        # Trigger a full sync so imported users appear immediately (if importEnabled=true)
        log "Triggering full LDAP sync for provider ${comp_id}..."
        kc create user-storage/${comp_id}/sync -r "${KC_TARGET_REALM}" --query action=triggerFullSync || \
          log "Warning: triggering full sync returned non-zero exit code"
      else
        log "Could not determine created component id; skipping automatic full sync."
      fi
    }

    ensure_role() {
      local role_name="$1"
      if role_exists "${role_name}"; then
        log "Realm role ${role_name} already exists."
      else
        log "Creating realm role ${role_name}..."
        kc create roles -r "${KC_TARGET_REALM}" -s name="${role_name}" -s description="Bootstrap managed role for ${role_name}"
      fi
    }

    ensure_client() {
      local client_id="$1"
      local display_name="$2"
      local redirect_uri="$3"
      local existing
      existing="$(client_uuid "${client_id}")"
      if [[ -n "${existing}" ]]; then
        log "Updating client ${client_id}..."
        kc update "clients/${existing}" -r "${KC_TARGET_REALM}"       -s enabled=true       -s name="${display_name}"       -s protocol=openid-connect       -s publicClient=false       -s serviceAccountsEnabled=true       -s standardFlowEnabled=true       -s directAccessGrantsEnabled=false       -s 'redirectUris=["'"${redirect_uri}"'"]'       -s 'webOrigins=["*"]'       -s 'attributes."pkce.code.challenge.method"="S256"'       -s 'attributes."post.logout.redirect.uris"="+"'       -s 'attributes."oauth2.device.authorization.grant.enabled"="false"'
      else
        log "Creating client ${client_id}..."
        kc create clients -r "${KC_TARGET_REALM}"       -s clientId="${client_id}"       -s enabled=true       -s name="${display_name}"       -s protocol=openid-connect       -s publicClient=false       -s serviceAccountsEnabled=true       -s standardFlowEnabled=true       -s directAccessGrantsEnabled=false       -s 'redirectUris=["'"${redirect_uri}"'"]'       -s 'webOrigins=["*"]'       -s 'attributes."pkce.code.challenge.method"="S256"'       -s 'attributes."post.logout.redirect.uris"="+"'       -s 'attributes."oauth2.device.authorization.grant.enabled"="false"'
          existing="$(client_uuid "${client_id}")"
      fi
      local mapper_name="${client_id}-audience"
      if ! kc get "clients/${existing}/protocol-mappers/models" -r "${KC_TARGET_REALM}" \
        | grep -q '"name"[[:space:]]*:[[:space:]]*"'"${mapper_name}"'"'; then
        log "Creating audience mapper ${mapper_name}..."
        kc create "clients/${existing}/protocol-mappers/models" -r "${KC_TARGET_REALM}"       -s name="${mapper_name}"       -s protocol=openid-connect       -s protocolMapper=oidc-audience-mapper       -s 'config."included.client.audience"="'"${client_id}"'"'       -s 'config."id.token.claim"="false"'       -s 'config."access.token.claim"="true"'
      fi
      local secret_json
      secret_json="$(kc get "clients/${existing}/client-secret" -r "${KC_TARGET_REALM}")"
      log "Client secret for ${client_id}: $(echo "${secret_json}" | json_first_string_field value)"
    }

    main() {
      wait_for_keycloak
      ensure_realm
      ensure_ldap_provider
      ensure_role "pihole_access"
      ensure_role "longhorn_access"
      ensure_role "grafana_access"
      ensure_role "prometheus_access"
      ensure_role "alertmanager_access"
      ensure_client "pihole" "Pi-hole OAuth2 Proxy" "https://copine-pihole01.dev.kube/oauth2/callback"
      ensure_client "longhorn" "Longhorn OAuth2 Proxy" "https://copine-longhorn.k8.dev.kube/oauth2/callback"
      ensure_client "grafana" "Grafana OAuth2 Proxy" "https://copine-grafana.k8.dev.kube/oauth2/callback"
      ensure_client "prometheus" "Prometheus OAuth2 Proxy" "https://copine-prometheus.k8.dev.kube/oauth2/callback"
      ensure_client "alertmanager" "Alertmanager OAuth2 Proxy" "https://copine-alertmanager.k8.dev.kube/oauth2/callback"
      log "Keycloak bootstrap complete."
    }

    main "$@"
