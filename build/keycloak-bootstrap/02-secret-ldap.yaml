apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-ldap
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: bootstrap-ldap-secret
type: Opaque
stringData:
  LDAP_VENDOR: "ad"
  LDAP_CONNECTION_URL: "ldaps://copine-dc01.cantrelloffice.cloud:636"
  LDAP_USERS_DN: "OU=JDELAB-Keycloak-Sync,DC=cantrelloffice,DC=cloud"
  LDAP_BIND_DN: "CN=Keycloak-LDAP-Service,OU=Services,OU=People,OU=JDELAB-Domain-NoSync,DC=cantrelloffice,DC=cloud"
  LDAP_BIND_CREDENTIAL: "S1airarose!895"
  LDAP_USERNAME_ATTR: "sAMAccountName"
  LDAP_RDN_ATTR: "cn"
  LDAP_UUID_ATTR: "objectGUID"
  LDAP_USER_OBJECT_CLASSES: "person,organizationalPerson,user"
  LDAP_SEARCH_SCOPE: "2"
  LDAP_EDIT_MODE: "READ_ONLY"
  LDAP_IMPORT_USERS: "true"
  LDAP_SYNC_REGISTRATIONS: "false"
  LDAP_PAGINATION: "true"
  LDAP_USE_TRUSTSTORE_SPI: "always"
  LDAP_ALLOW_KERBEROS_AUTH: "false"
  LDAP_KERBEROS_REALM: "CANTRELLOFFICE.CLOUD"
  LDAP_SERVER_PRINCIPAL: "HTTP/hmkeycloak.hypermute.cloud@CANTRELLOFFICE.CLOUD"
  LDAP_DEBUG: "false"
