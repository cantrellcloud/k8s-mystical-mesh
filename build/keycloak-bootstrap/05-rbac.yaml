apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-bootstrap
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-bootstrap
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-bootstrap
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: keycloak-bootstrap
    namespace: keycloak
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-bootstrap
