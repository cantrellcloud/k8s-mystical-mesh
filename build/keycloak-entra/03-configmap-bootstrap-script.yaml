apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-entra-link-script
  namespace: keycloak
data:
  entra-link.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    KCADM=/opt/keycloak/bin/kcadm.sh

    echo "Authenticating to Keycloak..."
    "$KCADM" config credentials \
      --server "$KC_URL" \
      --realm master \
      --user "$KC_ADMIN_USER" \
      --password "$KC_ADMIN_PASSWORD"

    REALM="${KC_REALM:-lab}"
    IDP_ALIAS="entra-oidc"

    echo "Checking if identity provider $IDP_ALIAS exists in realm $REALM..."
    if ! "$KCADM" get identity-provider/instances -r "$REALM" -q alias="$IDP_ALIAS" | jq -e '.[0]' >/dev/null 2>&1; then
      echo "Creating Entra ID OIDC identity provider..."
      "$KCADM" create identity-provider/instances -r "$REALM" \
        -s alias="$IDP_ALIAS" \
        -s providerId=oidc \
        -s enabled=true \
        -s trustEmail=true \
        -s firstBrokerLoginFlowAlias="first broker login" \
        -s config.clientId="$ENRA_CLIENT_ID" \
        -s config.clientSecret="$ENRA_CLIENT_SECRET" \
        -s config.authorizationUrl="https://login.microsoftonline.com/$ENRA_TENANT_ID/oauth2/v2.0/authorize" \
        -s config.tokenUrl="https://login.microsoftonline.com/$ENRA_TENANT_ID/oauth2/v2.0/token" \
        -s config.jwksUrl="https://login.microsoftonline.com/$ENRA_TENANT_ID/discovery/v2.0/keys" \
        -s config.userInfoUrl="https://graph.microsoft.com/oidc/userinfo" \
        -s config.defaultScope="openid profile email offline_access" \
        -s config.useJwksUrl=true \
        -s config.clientAuthMethod="client_secret_post" \
        -s config.validateSignature=true
    else
      echo "Identity provider $IDP_ALIAS already exists in realm $REALM. Skipping creation."
    fi

    # Retrieve the internal ID of the provider
    IDP_ID=$("$KCADM" get identity-provider/instances -r "$REALM" -q alias="$IDP_ALIAS" | jq -r '.[0].internalId')

    # Add groups-to-roles mapper if it doesn't exist
    if ! "$KCADM" get identity-provider/instances/$IDP_ID/mappers -r "$REALM" | jq -e '.[] | select(.name=="entra-groups-to-roles")' >/dev/null 2>&1; then
      echo "Creating Entra groups-to-roles mapper..."
      "$KCADM" create identity-provider/instances/$IDP_ID/mappers -r "$REALM" \
        -s name="entra-groups-to-roles" \
        -s identityProviderMapper=oidc-group-idp-mapper \
        -s config.claim="groups" \
        -s config.full.path="false" \
        -s config.new.role.name="true"
    else
      echo "Groups-to-roles mapper already exists."
    fi

    # Add object ID mapper (oid claim) if it doesn't exist
    if ! "$KCADM" get identity-provider/instances/$IDP_ID/mappers -r "$REALM" | jq -e '.[] | select(.name=="entra-oid")' >/dev/null 2>&1; then
      echo "Creating Entra object ID mapper..."
      "$KCADM" create identity-provider/instances/$IDP_ID/mappers -r "$REALM" \
        -s name="entra-oid" \
        -s identityProviderMapper=oidc-user-attribute-idp-mapper \
        -s config.claim="oid" \
        -s config.user.attribute="entra_oid"
    else
      echo "Entra object ID mapper already exists."
    fi

    echo "Entra ID OIDC configuration completed successfully."
