apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-entra-link
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-entra-link
          # Use the same Keycloak image as your deployment to ensure matching kcadm.sh
          image: quay.io/keycloak/keycloak:latest
          command: ["/bin/bash", "/bootstrap/entra-link.sh"]
          envFrom:
            - secretRef:
                name: keycloak-entra-admin
            - secretRef:
                name: keycloak-entra-id
          volumeMounts:
            - name: script-volume
              mountPath: /bootstrap
      volumes:
        - name: script-volume
          configMap:
            name: keycloak-entra-link-script
            defaultMode: 0755
