# ------------------------------------------------------------
# Keycloak (DHI chart) - production defaults with external database
# Database: external PostgreSQL via dbchecker and existing secret
# TLS/Ingress: managed externally (cert-manager + Ingress)
# ------------------------------------------------------------

# Optionally override the fully qualified name
fullnameOverride: ""

# Optionally override the name
nameOverride: ""

# The number of replicas to create (set >1 for high availability)
replicas: 2

image:
  # The Keycloak image repository
  repository: dhi.io/keycloak
  # Overrides the Keycloak image tag whose default is the chart appVersion
  tag: "26.5.5-debian13"
  # Overrides the Keycloak image tag with a specific digest
  digest: "sha256:364e0652162d3386368053d82fe7049d4ec223e9c5ba75add9d57b5fc371afd4"
  # The Keycloak image pull policy
  pullPolicy: IfNotPresent

# Image pull secrets for the Pod
imagePullSecrets:
  - name: keycloak-helm-pull-secret

ingress:
  # If `true`, an Ingress is created by the chart.  We leave this disabled
  # because the ingress is managed in resources manifests.
  enabled: false

networkPolicy:
  # If true, the Network policies are deployed
  enabled: false

serviceMonitor:
  # If `true`, a ServiceMonitor resource for the prometheus‑operator is created
  enabled: false

# Configure the proxy settings.  Enable proxy and set the mode to `edge`
# since TLS is terminated at the ingress controller.  This will set the
# KC_PROXY environment variable automatically.
proxy:
  enabled: true
  mode: edge
  http:
    enabled: true

prometheusRule:
  # If `true`, a PrometheusRule resource for the prometheus‑operator is created
  enabled: false

test:
  # If `true`, test resources are created
  enabled: false

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# ------------------------------------------------------------
# Persistence (PVC)
#
# PVCs created by a StatefulSet persist across Pod deletions by default.
# We mount a Longhorn-backed volume for /opt/keycloak/themes.
# ------------------------------------------------------------
volumeClaimTemplates: |
  - metadata:
      name: themes
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 5Gi

# Additional environment variables for Keycloak
#
# We disable strict hostname checking so that the admin console can be
# accessed via the external DNS name instead of returning a "localhost"
# error.  We also set the public hostname.  Java options may be tuned
# according to cluster sizing.
extraEnv: |
  - name: KC_LOG_LEVEL
    value: DEBUG
  - name: KC_HOSTNAME
    value: hmkeycloak.hypermute.cloud
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: JAVA_OPTS
    value: "-Xms256m -Xmx768m -Djavax.net.ssl.trustStore=/opt/preprod/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"

# Mount and import the private cluster CA bundle so Keycloak trusts
# TLS endpoints signed by preprod (e.g., internal services, external DB).
extraVolumes: |
  - name: preprod-ca-certs
    secret:
      secretName: preprod-ca-certs
  - name: preprod-truststore
    emptyDir: {}
  - name: keycloak-preprod-keytab
    secret:
      secretName: keycloak-preprod-keytab
      items:
        - key: keycloak.preprod.keytab
          path: keycloak.preprod.keytab

extraInitContainers: |
  - name: preprod-import-ca
    image: "{{ .Values.image.repository }}{{- if (.Values.image.digest) -}}@{{ .Values.image.digest }}{{- else -}}:{{ .Values.image.tag }}{{- end }}"
    imagePullPolicy: {{ .Values.image.pullPolicy }}
    securityContext:
      allowPrivilegeEscalation: false
      runAsUser: 65532
      runAsGroup: 65532
      runAsNonRoot: true
    command:
      - sh
      - -c
      - |
        set -euo pipefail

        TRUSTSTORE_DIR=/opt/preprod/truststore
        TRUSTSTORE=${TRUSTSTORE_DIR}/cacerts

        mkdir -p "${TRUSTSTORE_DIR}"

        # Seed the truststore from the base image (keep default public CAs).
        if [ -n "${JAVA_HOME:-}" ] && [ -f "${JAVA_HOME}/lib/security/cacerts" ]; then
          cp "${JAVA_HOME}/lib/security/cacerts" "${TRUSTSTORE}"
        elif [ -f /etc/ssl/certs/java/cacerts ]; then
          cp /etc/ssl/certs/java/cacerts "${TRUSTSTORE}"
        elif [ -f /opt/java/openjdk/lib/security/cacerts ]; then
          cp /opt/java/openjdk/lib/security/cacerts "${TRUSTSTORE}"
        else
          echo "No base JVM cacerts found; creating new truststore at ${TRUSTSTORE}"
        fi

        KEYTOOL=keytool
        if ! command -v keytool >/dev/null 2>&1; then
          if [ -n "${JAVA_HOME:-}" ] && [ -x "${JAVA_HOME}/bin/keytool" ]; then
            KEYTOOL="${JAVA_HOME}/bin/keytool"
          else
            echo "ERROR: keytool not found in PATH and JAVA_HOME is not set" >&2
            exit 1
          fi
        fi

        for cert in /opt/preprod/ca-certs/*.crt; do
          [ -f "${cert}" ] || continue
          alias="preprod-$(basename "${cert}" .crt)"
          echo "Importing ${cert} as ${alias}"
          "${KEYTOOL}" -importcert -noprompt -storepass changeit -keystore "${TRUSTSTORE}" -alias "${alias}" -file "${cert}" || true
        done
    volumeMounts:
      - name: preprod-truststore
        mountPath: /opt/preprod/truststore
      - name: preprod-ca-certs
        mountPath: /opt/preprod/ca-certs
        readOnly: true

extraVolumeMounts: |
  - name: preprod-truststore
    mountPath: /opt/preprod/truststore
    readOnly: true
  - name: themes
    mountPath: /opt/keycloak/themes
  - name: keycloak-preprod-keytab
    mountPath: /etc/krb5.keytab
    subPath: keycloak.preprod.keytab
    readOnly: true

# Enable the database checker to wait for the external database to be
# reachable before starting the Keycloak pod.
dbchecker:
  enabled: true

# Configure the external database.  Replace `db.example.com`, `keycloak`,
# `keycloak_user` and the secret name with the actual values for your
# deployment.  The `existingSecret` must contain a key named `password`
# with the base64 encoded database password.
database:
  vendor: postgres
  hostname: db.example.com
  port: 5432
  database: keycloak
  username: keycloak_user
  existingSecret: copine-keycloak-db-secret